<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">VoxKey cross-platform architecture</title>
  <desc id="desc">Architecture diagram showing the VoxKey desktop app, core orchestration layer, platform adapters for Windows, Linux, and macOS, a local ASR service, and optional CPU, GPU, and NPU runtime packages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fb"/>
      <stop offset="52%" stop-color="#eef7f4"/>
      <stop offset="100%" stop-color="#fff8ea"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#203040" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d5d69"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 38px; font-weight: 700; fill: #1f2a33; }
      .subtitle { font-size: 18px; font-weight: 400; fill: #52606b; }
      .section { font-size: 13px; font-weight: 700; fill: #5a6b77; letter-spacing: .05em; }
      .node-title { font-size: 21px; font-weight: 700; fill: #1f2a33; }
      .node-text { font-size: 15px; font-weight: 400; fill: #52606b; }
      .small { font-size: 13px; font-weight: 400; fill: #5d6c76; }
      .pill-text { font-size: 12px; font-weight: 700; fill: #ffffff; }
      .card { fill: #ffffff; stroke: #d7e0e7; stroke-width: 1.5; filter: url(#shadow); }
      .card-ui { fill: #eaf3ff; stroke: #9cbfe5; }
      .card-core { fill: #ecf7f3; stroke: #93cbb8; }
      .card-service { fill: #fff7e8; stroke: #dfbd72; }
      .card-adapter { fill: #fbfdff; stroke: #d5e0e7; }
      .card-backend { fill: #f4f0fa; stroke: #baa7d3; }
      .line { stroke: #4d5d69; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #8c9aa5; stroke-width: 2.4; stroke-dasharray: 7 8; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #d9e2e8; stroke-width: 1.4; }
      .pill-blue { fill: #315c96; }
      .pill-green { fill: #2e735f; }
      .pill-gold { fill: #8a6420; }
      .pill-purple { fill: #6c4f96; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <text x="72" y="68" class="title">VoxKey</text>
  <text x="72" y="102" class="subtitle">Cross-platform local voice input: lightweight app first, hardware-specific runtimes installed after first launch.</text>

  <text x="72" y="150" class="section">PRODUCT SHELL</text>
  <rect x="72" y="170" width="300" height="126" rx="18" class="card card-ui"/>
  <text x="102" y="211" class="node-title">Desktop UI</text>
  <text x="102" y="241" class="node-text">Tauri native shell</text>
  <text x="102" y="266" class="node-text">React renderer inside the app</text>
  <rect x="102" y="276" width="104" height="24" rx="12" class="pill-blue"/>
  <text x="121" y="292" class="pill-text">no web app</text>

  <text x="430" y="150" class="section">ORCHESTRATION</text>
  <rect x="430" y="170" width="360" height="126" rx="18" class="card card-core"/>
  <text x="460" y="211" class="node-title">Core</text>
  <text x="460" y="241" class="node-text">config, permissions, runtime detection</text>
  <text x="460" y="266" class="node-text">model manager and service lifecycle</text>
  <rect x="460" y="276" width="132" height="24" rx="12" class="pill-green"/>
  <text x="480" y="292" class="pill-text">shared logic</text>

  <text x="848" y="150" class="section">LOCAL INFERENCE</text>
  <rect x="848" y="170" width="360" height="126" rx="18" class="card card-service"/>
  <text x="878" y="211" class="node-title">ASR Service</text>
  <text x="878" y="241" class="node-text">stable local API for transcription</text>
  <text x="878" y="266" class="node-text">loads selected model and backend</text>
  <rect x="878" y="276" width="118" height="24" rx="12" class="pill-gold"/>
  <text x="897" y="292" class="pill-text">local only</text>

  <path d="M 372 233 L 416 233" class="line"/>
  <path d="M 790 233 L 834 233" class="line"/>

  <text x="72" y="350" class="section">PLATFORM ADAPTERS</text>
  <rect x="72" y="370" width="1136" height="178" rx="18" class="card card-adapter"/>

  <rect x="102" y="400" width="320" height="128" rx="14" fill="#ffffff" stroke="#d7e0e7"/>
  <text x="128" y="435" class="node-title">Windows</text>
  <text x="128" y="464" class="node-text">Trigger: global hotkey</text>
  <text x="128" y="489" class="node-text">Audio: WASAPI</text>
  <text x="128" y="514" class="small">Commit: UI Automation / TSF / clipboard</text>

  <rect x="480" y="400" width="320" height="128" rx="14" fill="#ffffff" stroke="#d7e0e7"/>
  <text x="506" y="435" class="node-title">Linux</text>
  <text x="506" y="464" class="node-text">Trigger: portal or evdev fallback</text>
  <text x="506" y="489" class="node-text">Audio: PipeWire portal / pw-record</text>
  <text x="506" y="514" class="small">Commit: fcitx5 / portal / wtype fallback</text>

  <rect x="858" y="400" width="320" height="128" rx="14" fill="#ffffff" stroke="#d7e0e7"/>
  <text x="884" y="435" class="node-title">macOS</text>
  <text x="884" y="464" class="node-text">Trigger: global hotkey / event tap</text>
  <text x="884" y="489" class="node-text">Audio: AVFoundation / CoreAudio</text>
  <text x="884" y="514" class="small">Commit: Accessibility / pasteboard fallback</text>

  <line x1="640" y1="336" x2="640" y2="370" class="line-soft"/>
  <text x="675" y="358" class="small">platform-specific capture and text commit</text>

  <text x="72" y="602" class="section">OPTIONAL RUNTIME PACKAGES</text>
  <rect x="72" y="622" width="1136" height="102" rx="18" class="card card-backend"/>

  <rect x="118" y="644" width="300" height="58" rx="16" fill="#ffffff" stroke="#cabbe0"/>
  <text x="146" y="667" class="node-title">CPU baseline</text>
  <text x="146" y="689" class="small">compatibility first</text>

  <rect x="490" y="644" width="300" height="58" rx="16" fill="#ffffff" stroke="#cabbe0"/>
  <text x="518" y="667" class="node-title">GPU package</text>
  <text x="518" y="689" class="small">Vulkan / Metal / DirectML</text>

  <rect x="862" y="644" width="300" height="58" rx="16" fill="#ffffff" stroke="#cabbe0"/>
  <text x="890" y="667" class="node-title">NPU package</text>
  <text x="890" y="689" class="small">OpenVINO / QNN / Core ML</text>

  <path d="M 1028 296 C 1028 332 1020 350 1018 370" class="line-soft"/>
  <path d="M 1028 548 C 1028 584 1028 598 1030 622" class="line-soft"/>
  <text x="1060" y="590" class="small">download after hardware scan</text>

  <line x1="222" y1="548" x2="222" y2="622" class="line-soft"/>
  <line x1="640" y1="548" x2="640" y2="622" class="line-soft"/>
  <line x1="1018" y1="548" x2="1018" y2="622" class="line-soft"/>

  <rect x="72" y="724" width="1136" height="1" fill="#d9e2e8"/>
  <text x="72" y="744" class="small">Model weights, downloaded runtimes, recordings, and local configuration stay outside Git.</text>
</svg>
