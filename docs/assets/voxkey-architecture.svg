<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">VoxKey architecture</title>
  <desc id="desc">Architecture diagram showing a user configured key trigger, PipeWire recording, Qwen3-ASR-GGUF transcription, and text commit through fcitx5 with wtype fallback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="48%" stop-color="#eef6f3"/>
      <stop offset="100%" stop-color="#f8f4ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2f3b45" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#53616d"/>
    </marker>
    <style>
      .title { font: 700 38px sans-serif; fill: #1f2a33; }
      .subtitle { font: 400 18px sans-serif; fill: #52606b; }
      .node-title { font: 700 22px sans-serif; fill: #1f2a33; }
      .node-text { font: 400 15px sans-serif; fill: #52606b; }
      .label { font: 700 13px sans-serif; fill: #36505f; letter-spacing: .04em; }
      .box { fill: #ffffff; stroke: #d7e0e7; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .box-accent { fill: #ecf7f3; stroke: #9ed4c0; }
      .box-output { fill: #fff7e8; stroke: #e2bf78; }
      .line { stroke: #53616d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #9aa7b2; stroke-width: 2.4; stroke-dasharray: 7 8; fill: none; marker-end: url(#arrow); }
      .pill { fill: #23323d; rx: 12; }
      .pill-text { font: 700 13px sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="80" y="78" class="title">VoxKey</text>
  <text x="80" y="112" class="subtitle">Local push-to-talk speech input for Linux / Wayland with explicit user key binding.</text>

  <rect x="80" y="172" width="220" height="150" class="box box-accent"/>
  <text x="108" y="218" class="node-title">User trigger</text>
  <text x="108" y="250" class="node-text">disabled by default</text>
  <text x="108" y="276" class="node-text">detect-key writes config</text>
  <rect x="108" y="286" width="106" height="28" class="pill"/>
  <text x="124" y="305" class="pill-text">evdev hold</text>

  <rect x="380" y="172" width="220" height="150" class="box"/>
  <text x="408" y="218" class="node-title">PipeWire</text>
  <text x="408" y="250" class="node-text">pw-record captures</text>
  <text x="408" y="276" class="node-text">16 kHz mono WAV</text>

  <rect x="680" y="172" width="250" height="150" class="box"/>
  <text x="708" y="218" class="node-title">Qwen3-ASR-GGUF</text>
  <text x="708" y="250" class="node-text">ONNX encoder on CPU</text>
  <text x="708" y="276" class="node-text">GGUF decoder via Vulkan</text>

  <rect x="1010" y="172" width="190" height="150" class="box box-output"/>
  <text x="1038" y="218" class="node-title">Text commit</text>
  <text x="1038" y="250" class="node-text">fcitx5 addon first</text>
  <text x="1038" y="276" class="node-text">wtype fallback</text>

  <path d="M 300 247 L 365 247" class="line"/>
  <path d="M 600 247 L 665 247" class="line"/>
  <path d="M 930 247 L 995 247" class="line"/>

  <rect x="232" y="390" width="820" height="112" class="box"/>
  <text x="264" y="432" class="node-title">Repository boundary</text>
  <text x="264" y="465" class="node-text">This repo ships the daemon, fcitx5 bridge, docs, tests, and install templates.</text>
  <text x="264" y="491" class="node-text">Model weights, recordings, virtual environments, and llama.cpp builds stay outside Git.</text>

  <path d="M 805 322 C 805 364 750 378 704 390" class="muted-line"/>
  <text x="842" y="366" class="label">external model files</text>
</svg>
